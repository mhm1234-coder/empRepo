<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - Pharmacy Store</title>

  <link rel="stylesheet" href="../cssFile/globalStyles.css">
</head>
<body>

<nav>
<a href="../index.html">My Pharmacy Store</a>
<ul>
  <li><a href="../index.html">Home</a></li>
  <li><a href="services.html">Services</a></li>
  <li><a href="contact.html">Contact</a></li>
  <li><a href="signup.html">Signup</a></li>
</ul>
</nav>

<div class="auth-container">
  <div class="auth-box">

    <h2>Login</h2>
    <p>Welcome back to your Pharmacy Store</p>

    <form onsubmit="return handleLogin(event)">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit">Login</button>
    </form>

    <div class="switch">
      Don’t have an account?
      <a href="signup.html">Create account</a>
    </div>

  </div>
</div>
<script src="../js/functions.js"></script>
<div id="toast" class="toast"></div>
<footer>
  <p>© 2026 My Pharmacy Store. All rights reserved.</p>
  <p>Contact: 0123456789 | Email: pharmacy@gmail.com</p>
</footer>
</body>
</html>
