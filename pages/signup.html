<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - Pharmacy Store</title>
<meta name="description" content="Pharmacy store services including delivery, consultation, and medicine support">
<link rel="stylesheet" href="../cssFile/globalStyles.css">
</head>

<body>
 <nav>
  <a href="../index.html">My Pharmacy Store</a>

  <ul>
    <li><a href="../index.html">Home</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="signup.html">Signup</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>

  <div class="cart-box">
    Cart (<span id="cart-count">0</span>)
  </div>
</nav>
<div class="auth-container">
  <div class="auth-box">

    <h2>Signup</h2>
    <p>Create your Pharmacy Store account</p>

    <form onsubmit="return handleSignup(event)">

      <input type="text" name="name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Create Account</button>
    </form>

    <div class="switch">
      Already have an account?
      <a href="login.html">Login here</a>
    </div>

  </div>
</div>
<script src="../js/functions.js"></script>
<div id="toast" class="toast"></div>
<footer>
  <p>© 2026 My Pharmacy Store. All rights reserved.</p>
  <p>Contact: 0123456789 | Email: pharmacy@gmail.com</p>
</footer>
</body>
</html>
