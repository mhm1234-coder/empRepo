<link rel="stylesheet" href="../cssFile/globalStyles.css">
</head>

<body>
<nav>
  <a href="../index.html">My Pharmacy Store</a>

  <ul>
    <li><a href="../index.html">Home</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="signup.html">Signup</a></li>
  </ul>

  <div class="cart-box">
    Cart (<span id="cart-count">0</span>)
  </div>
</nav>

<div class="page">
  <h1>Contact Us</h1>

  <div class="contact-info">
    <p><b>Email:</b> pharmacy@gmail.com</p>
    <p><b>Phone:</b> 0300-1234567</p>
    <p><b>Address:</b> 123 Pharmacy Street, City</p>
    <p><b>Working Hours:</b> 9:00 AM - 9:00 PM</p>
  </div>

  <div class="form-container">
  <form onsubmit="return handleContactForm(event)">
    <h2>Send us a message</h2>

    <input type="text" name="name" placeholder="Name" required>

    <input type="email" name="email" placeholder="Email" required>

    <textarea name="message" placeholder="Message" required></textarea>

    <button type="submit">Send Message</button>
  </form>
</div>
<script src="../js/functions.js"></script>
<div id="toast" class="toast"></div>
</body>
